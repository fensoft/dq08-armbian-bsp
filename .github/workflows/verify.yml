name: Verify BSP

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Hosted verification
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out BSP
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false

      - name: Read tested Armbian revision
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source ./module.conf
          [[ "${DQ08_TESTED_ARMBIAN_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
          printf 'armbian_commit=%s\n' "${DQ08_TESTED_ARMBIAN_COMMIT}" >> "${GITHUB_OUTPUT}"

      - name: Check out tested Armbian
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          repository: armbian/build
          ref: ${{ steps.metadata.outputs.armbian_commit }}
          path: armbian-build
          fetch-depth: 1
          persist-credentials: false

      - name: Verify module and installation dry run
        shell: bash
        run: |
          set -euo pipefail
          ./verify.sh
          ./install.sh --dry-run ./armbian-build

      - name: Run release-helper tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d tests/ci ]]; then
            python3 -m unittest discover -s tests/ci -p 'test_*.py'
          fi
          python3 -m unittest discover -s .github/tests -p 'test_*.py'
          python3 -m compileall -q scripts/ci .github/scripts
